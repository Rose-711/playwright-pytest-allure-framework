"""
==============================================================
  Pytest 配置文件
==============================================================

  这个文件告诉 Pytest：
  1. 去哪里找测试（testpaths）
  2. 哪些文件是测试文件（python_files）
  3. 每次跑测试时默认带什么参数（addopts）
  4. 有哪些自定义标签可以用（markers）

  这些配置也可以在 pyproject.toml 里写，
  但 pytest.ini 更直观，适合初学者。
==============================================================
"""

[pytest]

# ── 最低 Pytest 版本要求 ──
# 如果安装的 Pytest 低于 8.0 会报错
minversion = 8.0

# ── 测试文件搜索路径 ──
# 告诉 Pytest 去 tests/ 目录下找测试
testpaths = tests

# ── 哪些文件是测试文件 ──
# 文件名以 test_ 开头或以 _test 结尾的 Python 文件
python_files = test_*.py *_test.py

# ── 哪些类包含测试 ──
# 类名以 Test 开头的类
python_classes = Test*

# ── 哪些函数是测试 ──
# 函数名以 test_ 开头的函数
python_functions = test_*

# ── 默认命令行参数 ──
# 每次运行 pytest 时自动带上这些参数，不用每次都手敲
addopts =
    -v                      # 显示详细的测试结果（每个测试一行）
    -s                      # 允许 print() 输出到控制台（方便调试）
    --strict-markers        # 严格检查标签：用未定义的标签会报错
    --tb=short              # 报错时显示简短的堆栈跟踪（太长看不懂）
    --alluredir=reports/allure-results  # 保存 Allure 报告原始数据
    --clean-alluredir       # 每次跑之前清空旧的报告数据

# ── 自定义测试标签 ──
# 给测试打标签，方便分类运行
# 用法：
#   @pytest.mark.smoke       → 标记为冒烟测试
#   @pytest.mark.regression  → 标记为回归测试
# 运行：
#   pytest -m smoke          → 只跑冒烟测试
#   pytest -m "not slow"     → 跑除了慢速测试以外的所有测试
markers =
    smoke: 冒烟测试 —— 快速检查核心功能是否正常
    regression: 回归测试 —— 全面的功能回归验证
    critical: 关键路径测试 —— 最重要的业务流程
    slow: 慢速测试 —— 默认不跑，需要加 --run-slow 参数
