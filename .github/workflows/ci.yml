"""
==============================================================
  GitHub Actions CI 配置文件
==============================================================

  这个文件的作用：
  每次你 git push 到 GitHub，它会自动：
    1. 在云端服务器上拉取你的代码
    2. 安装依赖
    3. 跑测试
    4. 生成测试报告

  面试官看到这个会知道：你懂 CI/CD（持续集成）！

  运行结果可以在 GitHub 仓库的 Actions 标签页查看。
==============================================================
"""
name: CI  # 工作流的名字（显示在 GitHub Actions 页面上）

# ── 什么时候触发 ──────────────────────────────────────────
# push：你推送代码时触发
# pull_request：别人提 PR 时触发
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# ── 要执行的任务 ──────────────────────────────────────────
jobs:
  test:
    # 任务名称（显示在 GitHub Actions 页面上）
    name: 运行测试

    # 运行环境：Windows Server 2022
    # GitHub 的 Windows 环境自带 Chrome，所以我们能直接跑
    runs-on: windows-latest

    # ── 执行步骤 ──────────────────────────────────────────
    steps:
      # 第 1 步：拉取代码
      - name: 拉取代码
        uses: actions/checkout@v4

      # 第 2 步：安装 Python
      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 第 3 步：安装依赖
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 第 4 步：验证 Playwright 和 Chrome 可用
      - name: 验证环境
        run: |
          python -c "from playwright.sync_api import sync_playwright; print('Playwright OK')"
          where chrome || echo "Chrome not in PATH (will use channel=chrome)"

      # 第 5 步：运行测试（无头模式 + 基础 URL）
      - name: 运行测试
        run: |
          pytest tests/ -v `
            --base-url https://example.com `
            --alluredir=reports/allure-results `
            --junitxml=reports/junit.xml
        env:
          # CI 环境下使用无头模式（不显示浏览器窗口）
          HEADLESS: "true"
          # 超时设长一点，CI 环境通常比本地慢
          DEFAULT_TIMEOUT: "60000"
          NAVIGATION_TIMEOUT: "90000"

      # 第 6 步：上传 Allure 报告原始数据
      # 这些数据可以下载到本地用 allure serve 查看
      - name: 上传 Allure 报告数据
        if: always()  # 即使测试失败也上传
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: reports/allure-results/

      # 第 7 步：上传 JUnit 报告
      - name: 上传 JUnit 报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: reports/junit.xml

      # 第 8 步：生成并发布 Allure 报告到 GitHub Pages
      - name: 生成 Allure 报告
        if: always()
        uses: simple-elf/allure-report-action@v1.9
        with:
          allure_results: reports/allure-results
          allure_history: allure-history
          keep_reports: 20

      # 第 9 步：部署 Allure 报告到 GitHub Pages
      - name: 部署报告到 GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-history
          publish_branch: gh-pages
